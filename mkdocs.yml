site_name: Curso de Ciencia Política
site_description: Itinerario personal de formación en filosofía política, sociopolítica, economía y pensamiento crítico.
site_url: https://mrspagvi.github.io/Libros-Politica/

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: cambiar a claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: cambiar a oscuro
  font:
    text: JetBrains Mono
    code: JetBrains Mono
plugins:
  - search:
      lang: es
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

nav:
  - Inicio: index.md
  - Empieza aquí: empieza-aqui.md
  - Plan:
      - Visión general: plan/index.md
      - Plan maestro: plan/maestro.md
      - Fase 0 — Cimientos: plan/fase-0.md
      - Fase 1 — Filosofía clásica: plan/fase-1.md
      - Fase 2 — Economía política: plan/fase-2.md
      - Fase 3 — Sociopolítica s. XX: plan/fase-3.md
      - Fase 4 — Iberoamericana: plan/fase-4.md
      - Fase 5 — Síntesis: plan/fase-5.md
      - Módulo Historia (M4): plan/historia.md
      - M3 Pluriverso (autores): plan/pluriverso-autores.md
      - M4 Historia (autores): plan/historia-autores.md
      - Cómo ejecutar: plan/ejecutar.md
      - Sistema de notas: plan/notas.md
      - Manual de falacias: plan/falacias.md
      - Mapa de conexiones: plan/conexiones.md
      - Rúbricas Bloom: plan/bloom-rubricas.md
      - Puntos de naufragio: plan/naufragios.md
      - Salidas honorables: plan/salidas-honorables.md
  - Bibliografía: bibliografia.md
  - Actualidad: actualidad.md
  - Progreso: seguimiento.md
  - Lecturas:
      - Mis notas: lecturas/index.md
      - Plantilla: lecturas/plantilla.md
  - Ensayos: ensayos/index.md
  - Oratoria: oratoria/log.md
  - Plantillas:
      - Visión general: plantillas/index.md
      - Log de falacias: plantillas/plantilla-falacia.md
      - Ensayo propio: plantillas/plantilla-ensayo.md
      - Nota permanente (Zettelkasten): plantillas/plantilla-nota-permanente.md
