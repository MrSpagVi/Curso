site_name: Itinerarios — Pensamiento Político, Social y Económico
site_description: Autoestudio en filosofía, ciencias políticas, economía, política social y cultura. Cuatro itinerarios sobre un mismo corpus + plan integrado opcional.
site_url: https://mrspagvi.github.io/Libros-Politica/

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: cambiar a claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: cambiar a oscuro
  font:
    text: JetBrains Mono
    code: JetBrains Mono
plugins:
  - search:
      lang: es
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

nav:
  - Inicio: index.md
  - Ramas:
      - "Portal · 7 puertas": ramas/index.md
      - "📚 Filosofía": ramas/filosofia.md
      - "🏛 Ciencias Políticas": ramas/ciencias-politicas.md
      - "💰 Economía Política": ramas/economia.md
      - "🤝 Política Social": ramas/politica-social.md
      - "🎭 Estudios Culturales y Comunicación": ramas/estudios-culturales.md
      - "👥 Sociología": ramas/sociologia.md
      - "🌐 Relaciones Internacionales": ramas/relaciones-internacionales.md
  - Plan integrado:
      - "Empieza aquí": empieza-aqui.md
      - "Cómo se aprende acá": como-se-aprende.md
      - "Plan maestro": plan/maestro.md
      - "Visión general": plan/index.md
      - "Fase 0 — Cimientos": plan/fase-0.md
      - "Fase 1 — Filosofía clásica": plan/fase-1.md
      - "Fase 2 — Economía política": plan/fase-2.md
      - "Fase 3 — Sociopolítica s. XX": plan/fase-3.md
      - "Fase 4 — Iberoamericana": plan/fase-4.md
      - "Fase 5 — Síntesis": plan/fase-5.md
      - "Ciclo III (opcional)": plan/ciclo-iii.md
      - "M5 Política Social": plan/m5-politica-social.md
      - "M6 Desarrollo Cultural": plan/m6-cultura.md
      - "Temas-bisagra": plan/temas-bisagra.md
      - "Lecturas complementarias": plan/lecturas-complementarias.md
      - "Canon ampliado (universidades top)": plan/canon-ampliado.md
      - "Salidas honorables": plan/salidas-honorables.md
  - Método de estudio:
      - "Cómo ejecutar": plan/ejecutar.md
      - "Sistema de notas": plan/notas.md
      - "Tutorial — aprender a tomar notas": plan/notas-tutorial.md
      - "Manual de falacias": plan/falacias.md
      - "Rúbricas Bloom": plan/bloom-rubricas.md
      - "Puntos de naufragio": plan/naufragios.md
      - "Mapa de conexiones": plan/conexiones.md
  - Mi práctica:
      - "Progreso (seguimiento)": seguimiento.md
      - "Mis lecturas": lecturas/index.md
      - "Plantilla de lectura": lecturas/plantilla.md
      - "Mis ensayos": ensayos/index.md
      - "Oratoria — log": oratoria/log.md
      - "Plantillas (índice)": plantillas/index.md
      - "Plantilla — falacia": plantillas/plantilla-falacia.md
      - "Plantilla — ensayo": plantillas/plantilla-ensayo.md
      - "Plantilla — nota permanente": plantillas/plantilla-nota-permanente.md
      - "Plantilla — cuaderno papel": plantillas/plantilla-cuaderno-papel.md
      - "Plantilla — Zettelkasten papel": plantillas/plantilla-zettelkasten-papel.md
      - "Plantilla — setup Notion": plantillas/plantilla-notion-setup.md
  - Recursos:
