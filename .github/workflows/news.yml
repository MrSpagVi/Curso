name: Update news feeds

on:
  schedule:
    # 06:00 UTC daily (~3am Argentina, 8am Madrid)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install feedparser
        run: pip install feedparser

      - name: Run news updater
        run: python scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/actualidad.md
          if git diff --staged --quiet; then
            echo "Sin cambios en actualidad."
          else
            git commit -m "auto: actualidad $(date -u +%Y-%m-%d)"
            git push
          fi
